name: Release

on:
  push:
    branches:
      - master

jobs:
  lint_and_test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: 📦 Install Poetry
        run: |
          pipx install poetry
          poetry self add poetry-plugin-export
      - name: 📝 Generate requirements.txt
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
      - name: 💾 Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: ➕ Install dependencies
        run: |
          poetry install --no-interaction
      - name: 🧹 Run linters
        run: |
          poetry run ruff check src/mduck tests
          poetry run ruff format --check src/mduck tests
          poetry run mypy --strict src/mduck
      - name: 🧪 Run tests
        run: poetry run pytest --cov=src/mduck --cov-report=xml
      - name: 📛 Generate coverage badge
        run: poetry run genbadge coverage -i coverage.xml -o assets/coverage.svg
      - name: 💾 Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(ci): Update coverage badge"
          file_pattern: "assets/coverage.svg"

  release:
    name: 🚀 Release
    needs: lint_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
      packages: write # to be able to upload packages to ghcr.io
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed by semantic-release
      - name: 🔄 Synchronize with remote master
        run: git pull --rebase origin master
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: 📦 Install Poetry
        run: |
          pipx install poetry
          poetry self add poetry-plugin-export
      - name: 📝 Generate requirements.txt
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
      - name: 💾 Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: ➕ Install dependencies
        run: |
          poetry install --no-interaction
      - name: 🎉 Semantic Release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏗️ Set up Docker Buildx
        if: steps.semantic_release.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3
      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v4
        if: steps.semantic_release.outputs.released == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Build and push Docker image
        if: steps.semantic_release.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.semantic_release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
